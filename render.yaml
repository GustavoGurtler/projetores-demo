services:
  - type: web
    name: projetores-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health
    envVars:
      - key: DEMO_DATA_ENABLED
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
      - key: APP_SECRET_KEY
        generateValue: true
