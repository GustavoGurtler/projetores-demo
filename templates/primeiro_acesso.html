<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Primeiro Acesso</title>
</head>
<body>

<div class="container">
    <h1>Primeiro Acesso da TI</h1>
    <p class="subtle">
        Cadastre a primeira conta da equipe de TI para liberar o painel interno e a gest&atilde;o dos logins.
    </p>

    {% if mensagem %}
    <div class="alert alert-{{ tipo_mensagem }}">
        <p>{{ mensagem }}</p>
    </div>
    {% endif %}

    <form action="/primeiro-acesso" method="post">
        <label for="sigla">Sigla</label>
        <input
            type="text"
            id="sigla"
            name="sigla"
            maxlength="3"
            minlength="3"
            pattern="[A-Za-z]{3}"
            autocomplete="off"
            placeholder="ABC"
            title="Digite exatamente 3 letras."
            oninput="this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 3)"
            required
        >

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" minlength="4" required>

        <label for="confirmar_senha">Confirmar Senha</label>
        <input type="password" id="confirmar_senha" name="confirmar_senha" minlength="4" required>

        <button type="submit">Criar acesso da TI</button>
    </form>

    <div class="link-row">
        <a class="page-link" href="/login">Voltar para login</a>
    </div>
</div>

</body>
</html>
